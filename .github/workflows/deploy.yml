name: Build & Deploy Web

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install love.js
        run: npm install -g love.js

      - name: Package .love file
        run: |
          zip -9 -r hicret.love . \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".DS_Store" \
            --exclude "Thumbs.db" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "web/*"
          echo "hicret.love size: $(du -sh hicret.love | cut -f1)"

      - name: Build web version
        run: |
          love.js hicret.love web_build \
            --title "Hicret" \
            --memory 67108864
          echo "Web build complete"
          ls -lh web_build/

      - name: Replace default index.html
        run: cp web/index.html web_build/index.html

      - name: Copy additional web assets
        run: |
          if [ -d web/assets ]; then
            cp -r web/assets/* web_build/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_build/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
